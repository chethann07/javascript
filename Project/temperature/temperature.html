<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="temperature.css" />
    <title>Temperature Converter</title>
  </head>
  <body>
    <form>
      <h1>Temperature Converter</h1>
      <input type="number" id="textBox" value="0" />
      <br />
      <input type="radio" name="unit" id="toFahrenheit" />
      <label for="toFahrenheit">Celcius ➱ Fahrenheit </label>
      <br />
      <input type="radio" name="unit" id="toCelcius" />
      <label for="toCelcius">Fahrenheit ➱ Celcius</label>
      <br />
      <button type="button" onclick="convert()">Submit</button>
      <p id="result">Select an option</p>
    </form>

    <script src="temperature.js"></script>
  </body>
</html>
